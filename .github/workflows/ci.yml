name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: northwind
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
        options: >-
          --health-cmd "pg_isready -U postgres -d northwind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: changeme
      DATABASE_NAME: northwind
      DATABASE_SSL_MODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Ensure gofmt
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m
      - name: Run migrations
        run: go run ./cmd/migrate --action up
      - name: Run tests
        run: go test ./... -coverprofile=coverage.out
      - name: Generate SBOM
        run: make sbom
      - name: Package Lambda artifact
        run: make package-lambda
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/bom.json
      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-bootstrap
          path: dist/bootstrap.zip

  k6-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Start dependencies
        run: docker compose up -d db otel-collector prometheus
      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U postgres -d northwind >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready" >&2
          docker compose logs db
          exit 1
      - name: Run migrations
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_USER: postgres
          DATABASE_PASSWORD: changeme
          DATABASE_NAME: northwind
          DATABASE_SSL_MODE: disable
        run: go run ./cmd/migrate --action up
      - name: Start API
        run: docker compose up -d api
      - name: Wait for API readiness
        run: |
          for i in {1..40}; do
            if curl -sf http://localhost:8080/readyz >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "API did not become ready" >&2
          docker compose logs api
          exit 1
      - uses: grafana/setup-k6-action@v1
        with:
          k6-version: v0.49.0
      - name: Run k6 smoke test
        env:
          BASE_URL: http://localhost:8080
          AUTH_ADMIN_USERNAME: admin
          AUTH_ADMIN_PASSWORD: changeit
          K6_VUS: "1"
          K6_ITERATIONS: "10"
        run: k6 run scripts/k6/smoke.js
      - name: Collect API logs
        if: always()
        run: docker compose logs api
      - name: Shutdown environment
        if: always()
        run: docker compose down --volumes --remove-orphans

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - k6-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_CDK_DEPLOY == 'true'
    permissions:
      id-token: write
      contents: read
    env:
      PROVISIONED_CONCURRENCY: ${{ vars.PROVISIONED_CONCURRENCY || '' }}
      CANARY_PERCENTAGE: ${{ vars.CANARY_PERCENTAGE || '' }}
      CANARY_INTERVAL: ${{ vars.CANARY_INTERVAL || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lambda-bootstrap
          path: dist
      - name: Unpack Lambda artifact
        run: unzip -o dist/bootstrap.zip -d dist
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CDK dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infra/cdk/requirements.txt
          npm install --global aws-cdk@2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEPLOY_REGION }}
      - name: Deploy CDK stack
        run: |
          cd infra/cdk
          PARAMS=""
          if [ -n "$PROVISIONED_CONCURRENCY" ]; then
            PARAMS="$PARAMS --parameters NorthwindApiStack:ProvisionedConcurrency=$PROVISIONED_CONCURRENCY"
          fi
          if [ -n "$CANARY_PERCENTAGE" ]; then
            PARAMS="$PARAMS --parameters NorthwindApiStack:CanaryPercentage=$CANARY_PERCENTAGE"
          fi
          if [ -n "$CANARY_INTERVAL" ]; then
            PARAMS="$PARAMS --parameters NorthwindApiStack:CanaryIntervalMinutes=$CANARY_INTERVAL"
          fi
           NorthwindApiStack --require-approval never $PARAMS
